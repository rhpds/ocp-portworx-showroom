---
site:
  title: "LB1127: Unifying VMs and Containers on Red Hat OpenShift with Portworx"
  start_page: modules::index.adoc

content:
  sources:
  - url: .
    start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true
  supplemental_files:
  - path: ./content/supplemental-ui
  - path: ./content/lib
  - path: ui.yml
    contents: "static_files: [ .nojekyll, css/site-extra.css, js/buttons.js ]"

antora:
  extensions:
  - require: ./content/lib/dev-mode.js
    enabled: false
  - require: ./content/lib/inject-buttons.js

output:
  dir: ./www
