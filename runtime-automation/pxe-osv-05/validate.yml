---
- name: pxe-osv-05 Autopilot Validation
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    vm_namespace: vmtest
    vm_name: centos-stream9-autopilot
    data_pvc_name: centos-stream9-autopilot-data-disk
    autopilot_rule_name: volume-resize
    ssh_key_path: ~/.ssh/id_rsa
    ssh_user: cloud-user
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15"
    virtctl_ssh_opts: "-t '-o StrictHostKeyChecking=no' -t '-o UserKnownHostsFile=/dev/null' -t '-o ConnectTimeout=15'"

  tasks:

    # -------------------------------------------------------
    # Check 1 — VirtualMachine centos-stream9-autopilot exists in vmtest
    # -------------------------------------------------------
    - name: Check VM exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: "{{ vm_name }}"
        namespace: "{{ vm_namespace }}"
      register: r_vm
      ignore_errors: true

    # -------------------------------------------------------
    # Check 2 — AutopilotRule volume-resize exists (cluster-scoped)
    # -------------------------------------------------------
    - name: Check AutopilotRule exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: autopilot.libopenstorage.org/v1alpha1
        kind: AutopilotRule
        name: "{{ autopilot_rule_name }}"
      register: r_autopilot_rule
      ignore_errors: true

    # -------------------------------------------------------
    # Check 3 — Data PVC exists and has label expand=true
    # -------------------------------------------------------
    - name: Check data PVC labelled with expand=true
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: PersistentVolumeClaim
        name: "{{ data_pvc_name }}"
        namespace: "{{ vm_namespace }}"
        label_selectors:
          - "expand=true"
      register: r_pvc_label
      ignore_errors: true

    # -------------------------------------------------------
    # Check 4 — Autopilot ActiveActionsTaken event fired
    # -------------------------------------------------------
    - name: Check Autopilot ActiveActionsTaken event
      ansible.builtin.shell: >-
        sshpass -p '{{ bastion_password }}' ssh {{ ssh_opts }}
        {{ bastion_user }}@{{ bastion_host }}
        "oc get events
        --field-selector involvedObject.kind=AutopilotRule,involvedObject.name={{ autopilot_rule_name }}
        --all-namespaces --sort-by .lastTimestamp
        -o custom-columns=MESSAGE:.message 2>&1"
      register: r_autopilot_events
      changed_when: false
      ignore_errors: true

    # -------------------------------------------------------
    # Check 5 — Data PVC has expanded to 10Gi
    # -------------------------------------------------------
    - name: Check data PVC capacity post-expansion
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: PersistentVolumeClaim
        name: "{{ data_pvc_name }}"
        namespace: "{{ vm_namespace }}"
      register: r_pvc_expanded
      ignore_errors: true

    - name: Extract PVC capacity
      ansible.builtin.set_fact:
        pvc_capacity: >-
          {{ (r_pvc_expanded.resources | first).status.capacity.storage | default('0Gi') }}
      when: r_pvc_expanded.resources | default([]) | length > 0

    # -------------------------------------------------------
    # Check 6 — /data mounted and shred file exists in VM
    # -------------------------------------------------------
    - name: Check /data mount and shred file in VM
      ansible.builtin.shell: >-
        sshpass -p '{{ bastion_password }}' ssh {{ ssh_opts }}
        {{ bastion_user }}@{{ bastion_host }}
        "virtctl ssh {{ ssh_user }}@vm/{{ vm_name }}/{{ vm_namespace }}
        -i {{ ssh_key_path }} {{ virtctl_ssh_opts }}
        -c 'mountpoint /data && test -f /data/file && echo DATA_READY || echo DATA_MISSING' 2>&1"
      register: r_data_mount
      changed_when: false
      ignore_errors: true

    # -------------------------------------------------------
    # Check 7 — /data filesystem >= 9G
    # 9G = 9 * 1024 * 1024 = 9437184 1K-blocks
    # -------------------------------------------------------
    - name: Check /data filesystem size in VM
      ansible.builtin.shell: >-
        sshpass -p '{{ bastion_password }}' ssh {{ ssh_opts }}
        {{ bastion_user }}@{{ bastion_host }}
        "virtctl ssh {{ ssh_user }}@vm/{{ vm_name }}/{{ vm_namespace }}
        -i {{ ssh_key_path }} {{ virtctl_ssh_opts }}
        -c 'df /data | awk \"NR==2{print (\\\$2 >= 9437184) ? \\\"SIZE_OK\\\" : \\\"SIZE_SMALL\\\"}\"' 2>&1"
      register: r_df_check
      changed_when: false
      ignore_errors: true

    # -------------------------------------------------------
    # Build result booleans
    # -------------------------------------------------------
    - name: Build task results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_vm.resources | default([]) | length > 0 }}"
        _task2_ok: "{{ r_autopilot_rule.resources | default([]) | length > 0 }}"
        _task3_ok: "{{ r_pvc_label.resources | default([]) | length > 0 }}"
        _task4_ok: >-
          {{ r_autopilot_events is not skipped and
             r_autopilot_events is not failed and
             'ActiveActionsTaken' in (r_autopilot_events.stdout | default('')) }}
        _task5_ok: >-
          {{ pvc_capacity is defined and
             (pvc_capacity | regex_replace('Gi','') | int) >= 10 }}
        _task6_ok: >-
          {{ r_data_mount is not skipped and
             r_data_mount is not failed and
             'DATA_READY' in (r_data_mount.stdout | default('')) }}
        _task7_ok: >-
          {{ r_df_check is not skipped and
             r_df_check is not failed and
             'SIZE_OK' in (r_df_check.stdout | default('')) }}

    # -------------------------------------------------------
    # Validate all tasks
    # -------------------------------------------------------
    - name: Validate all tasks
      validation_check:
        check: >-
          {{ _task1_ok and _task2_ok and _task3_ok and
             _task4_ok and _task5_ok and _task6_ok and _task7_ok }}
        pass_msg: |
          Task 1: VM centos-stream9-autopilot exists in vmtest
          Task 2: AutopilotRule volume-resize exists
          Task 3: Data PVC labelled with expand=true
          Task 4: Autopilot ActiveActionsTaken event fired
          Task 5: Data PVC expanded to 10Gi
          Task 6: /data mounted and shred file present in VM
          Task 7: /data filesystem resized to >= 9G in VM
        error_msg: |
          {{ '[ OK ]' if _task1_ok else '[FAIL]' }} Task 1: VM — {{ 'found' if _task1_ok else 'not found — run Solve or create VM from lab steps' }}
          {{ '[ OK ]' if _task2_ok else '[FAIL]' }} Task 2: AutopilotRule — {{ 'exists' if _task2_ok else 'not found — apply the AutopilotRule manifest' }}
          {{ '[ OK ]' if _task3_ok else '[FAIL]' }} Task 3: PVC label — {{ 'expand=true present' if _task3_ok else 'missing — oc label pvc {{ data_pvc_name }} expand=true -n vmtest' }}
          {{ '[ OK ]' if _task4_ok else '[FAIL]' }} Task 4: Autopilot event — {{ 'ActiveActionsTaken' if _task4_ok else 'not fired — fill disk first, wait 15-20 min' }}
          {{ '[ OK ]' if _task5_ok else '[FAIL]' }} Task 5: PVC capacity — {{ '>= 10Gi' if _task5_ok else 'current: ' + (pvc_capacity | default('unknown')) + ' — wait for Autopilot' }}
          {{ '[ OK ]' if _task6_ok else '[FAIL]' }} Task 6: /data — {{ 'mounted with file' if _task6_ok else 'not ready — partition/format/mount /dev/vdb and fill with shred' }}
          {{ '[ OK ]' if _task7_ok else '[FAIL]' }} Task 7: filesystem — {{ '>= 9G' if _task7_ok else 'too small — resize partition and filesystem' }}
